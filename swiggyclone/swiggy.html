<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

    <style>

<body>
    <div class ="navbar">
        <div class="logo">
            <img src="logo.png">
        </div>
        

        <div class="links">
            <a href="#">Swiggy Corporate</a>
            <a href="#">Partner with us</a>
            <button class="getapp">
                Get the App
            </button>
            <button class="signin">
                Sign in
            </button>

        </div>
    </div>

    <div class="hero">
        <img  src="hero1.png">
        <img style="align-self: end;" src="hero2.png">

        <div class="heading">
            <h1> Order food & groceries. Discover<br> best restaurants. Swiggy it.!</h1>
            <div class="input">
                <input class="location"  placeholder="📍 Enter your delivery location">
                <input  placeholder="Search for restaurant, items or more">
            </div>
        </div>
        <div class="content">
    
    <div class="card">
        <h2>FOOD DELIVERY</h2>
        <p class="sub">FROM RESTAURANTS</p>
        <span class="offer">UPTO 60% OFF</span>

        <div class="bottom">
            <div class="arrow">→</div>
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" alt="food">
        </div>
    </div>

    <div class="card">
        <h2>INSTAMART</h2>
        <p class="sub">INSTANT GROCERY</p>
        <span class="offer">UPTO 60% OFF</span>

        <div class="bottom">
            <div class="arrow">→</div>
            <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db" alt="grocery">
        </div>
    </div>

    <div class="card">
        <h2>DINEOUT</h2>
        <p class="sub">EAT OUT & SAVE MORE</p>
        <span class="offer">UPTO 50% OFF</span>

        <div class="bottom">
            <div class="arrow">→</div>
            <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5" alt="dining">
        </div>
    </div>

</div>
