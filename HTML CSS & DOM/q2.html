<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facebook</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Helvetica, Arial, sans-serif;
}

body {
  background: #f0f2f5;
}

/* MAIN LAYOUT */
.container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 100vh;
  padding: 0 10%;
}

/* LEFT */
.left {
  max-width: 350px;
}

.fb-logo {
  width: 50px;
  margin-bottom: 20px;
}

.left-text {
  font-size: 44px;
  font-weight: 700;
  line-height: 1.2;
  color: #1c1e21;
}

.left-text span {
  color: #1877f2;
}

/* CENTER IMAGE */
.center {
  position: relative;
  width: 350px;
  height: 350px;
}

/* cards */
.card {
  position: absolute;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* individual cards positioning */
.card1 {
  width: 200px;
  height: 140px;
  top: 40px;
  left: 0;
}

.card2 {
  width: 200px;
  height: 260px;
  top: 0;
  right: 0;
}

.card3 {
  width: 160px;
  height: 180px;
  bottom: 0;
  left: 60px;
}

/* emoji bubbles */
.emoji {
  position: absolute;
  font-size: 28px;
}

.emoji1 {
  top: -10px;
  left: 120px;
}

.emoji2 {
  bottom: 20px;
  right: -10px;
}

/* profile circle */
.profile {
  position: absolute;
  bottom: -20px;
  right: 60px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 4px solid white;
  overflow: hidden;
}

.profile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RIGHT */
.right {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.login-card {
  width: 380px;
  background: #fff;
  padding: 20px 18px;
  border-radius: 8px;
  box-shadow: 0 2px 15px rgba(0,0,0,0.1);
}

.login-card input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid #dddfe2;
  border-radius: 6px;
  font-size: 15px;
}

.login-btn {
  width: 100%;
  background: #1877f2;
  color: white;
  padding: 14px;
  border: none;
  border-radius: 6px;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
}

.forgot {
  display: block;
  text-align: center;
  margin: 14px 0;
  color: #1877f2;
  font-size: 14px;
  text-decoration: none;
}

.divider {
  height: 1px;
  background: #dadde1;
  margin: 18px 0;
}

.create-btn {
  display: block;
  margin: auto;
  background: #42b72a;
  color: white;
  padding: 12px 16px;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.meta {
  margin-top: 20px;
  font-size: 13px;
  color: #737373;
}

/* RESPONSIVE */
@media (max-width: 1000px) {
  .container {
    flex-direction: column;
    justify-content: center;
    text-align: center;
  }

  .center {
    margin: 40px 0;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img class="fb-logo" src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
    <div class="left-text">
      Explore the things <br>
      <span>you love.</span>
    </div>
  </div>

  <!-- CENTER VISUAL -->
  <div class="center">

    <div class="card card1">
      <img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
    </div>

    <div class="card card2">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
    </div>

    <div class="card card3">
      <img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659">
    </div>

    <div class="emoji emoji1">😂</div>
    <div class="emoji emoji2">❤️</div>

    <div class="profile">
      <img src="https://randomuser.me/api/portraits/women/44.jpg">
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="login-card">
      <input type="text" placeholder="Email address or mobile number">
      <input type="password" placeholder="Password">
      <button class="login-btn">Log in</button>
      <a href="#" class="forgot">Forgotten password?</a>
      <div class="divider"></div>
      <button class="create-btn">Create new account</button>
    </div>
    <div class="meta">Meta</div>
  </div>

</div>

</body>
</html>
