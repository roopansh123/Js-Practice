<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(231, 223, 223);
            align-content: center;
        }
        fieldset{
            background-color: white;
            width: 70%;
            
        }
        #name{
            width: 100%;
            height: 20px;
        }
        button{
            background-color: rgb(0, 102, 246);
            border: 10px;
            padding: 8px;
            border-radius: 5px;
            color: white;
            
        }
    </style>
</head>
<body>

    <form method="post">
        <h1>Job Application Form</h1>

        

        <fieldset> 
            <legend> <h2>Personal Information </h2></legend>
            <label for="name">Full Name <span style="color: red;">*</span></label>
            <br>
            <input placeholder="Rahul Sharma" id="name">
            <br>
            <br>
            <label>Email Id :</label>
            <input placeholder="Email Id" id="name">
            <br>
            <br>
            <label>Mobile Number:</label>
            <input placeholder="Mobile Number" id="name">
            <br>
            <br>
            <label>Date of Birth</label>
            <input type="date" id="name">



        </fieldset>
        <fieldset>
            <legend><h2>Professional Details </h2></legend>
            <label>Year of Experience <span style="color: red;">*</span> </label>
            <br>
            <input type="number" id="name" placeholder="e.g. 3">
            <br>
            <br>
            <label>Expected Salary (₹) <span style="color: red;">*</span> </label>
            <br>
            <input type="number" id="name" placeholder="e.g. 75000">
            <p style="margin-top: 0%; color: grey; font-size: small;" >Enter in multiples of ₹ 5,000(min ₹ per month) <span style="color: red;">*</span></p>
            
            <label>Portfolio / GitHub URL <span style="color: red;">*</span> </label>
            <br>
            <input type="text" id="name" placeholder="https://github.com/yourname">
            <br>

            <br>
            <label>LinkedIn Profile (optional)</label>
            <br>
            <input type="number" id="name" placeholder="https://github.com/yourname">
            <br>

            <br>
            <label>Upload Resume (PDF) <span style="color: red;">*</span> </label>
            <br>
            <div style="border: 4px;"><input  type="file"></div>
            
            <p style="margin-top: 0%; color: grey; font-size: small;" > PDF Files Only </p>

        </fieldset>


        <fieldset>
            <legend><h2>Work Preferences</h2></legend>
       
            <label>Preferred Job Type <span style="color: red;">*</span></label>
            <br>
            <select id="name">
                <option>--Select--</option>
                <option>Full Time</option>
                <option>Part Time</option>
            </select>
            <br> 
            <br>

            

        </fieldset>


        <input type="number" value="111111" >


        <br>
        <button type="submit">Submit Application</button>

        <button type="reset">Clear Form</button>
    </form>
    
</body>
</html>
