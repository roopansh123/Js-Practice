<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      .stopwatch {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div class="stopwatch">
      <div class="time">
        <span id="minutes">00</span>: <span id="seconds">00</span>:
        <span id="miliseconds">00</span>
      </div>
      <button>Start</button>
      <button>Stop</button>
      <button>Reset</button>
    </div>
  </body>
</html>
