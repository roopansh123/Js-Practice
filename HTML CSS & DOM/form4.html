<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Onboarding Form</title>
</head>
<body>

    <h1>User Onboarding Form</h1>

    <form>

        <!-- 4.1 Personal Information -->
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name:</label><br>
            <input 
                type="text" 
                id="fullname" 
                name="fullname" 
                required 
                minlength="3" 
                pattern="[A-Za-z ]+" 
                placeholder="Enter full name"><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input 
                type="date" 
                id="dob" 
                name="dob" 
                required 
                max="<?php echo date('Y-m-d'); ?>"><br><br>

            <p>Gender:</p>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="other" required>
            <label for="other">Other</label>
        </fieldset>

        <br>

        <!-- 4.2 Contact Information -->
        <fieldset>
            <legend>Contact Information</legend>

            <label for="email">Email:</label><br>
            <input 
                type="email" 
                id="email" 
                name="email" 
                required 
                placeholder="Enter email"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input 
                type="tel" 
                id="phone" 
                name="phone" 
                required 
                pattern="[0-9]{10}" 
                placeholder="10-digit number"><br><br>

            <label for="address">Address:</label><br>
            <textarea 
                id="address" 
                name="address" 
                required 
                minlength="10" 
                placeholder="Enter address"></textarea>
        </fieldset>

        <br>

        <!-- 4.3 Account Credentials -->
        <fieldset>
            <legend>Account Credentials</legend>

            <label for="username">Username:</label><br>
            <input 
                type="text" 
                id="username" 
                name="username" 
                required 
                minlength="5" 
                maxlength="15" 
                pattern="^\S+$" 
                placeholder="No spaces"><br><br>

            <label for="password">Password:</label><br>
            <input 
                type="password" 
                id="password" 
                name="password" 
                required 
                pattern="^(?=.*[A-Z])(?=.*[0-9])(?=.*[\W_]).{8,}$" 
                placeholder="Min 8 chars, 1 uppercase, 1 number, 1 special char"><br><br>

            <label for="confirm_password">Confirm Password:</label><br>
            <input 
                type="password" 
                id="confirm_password" 
                name="confirm_password" 
                required>
        </fieldset>

        <br>

        <!-- 4.4 Professional Details -->
        <fieldset>
            <legend>Professional Details</legend>

            <label for="experience">Experience Level:</label><br>
            <select id="experience" name="experience" required>
                <option value="">Select</option>
                <option value="fresher">Fresher</option>
                <option value="junior">1-3 Years</option>
                <option value="mid">3-5 Years</option>
                <option value="senior">5+ Years</option>
            </select><br><br>

            <p>Skills:</p>
            <input type="checkbox" id="html" name="skills" value="html" required>
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="skills" value="css">
            <label for="css">CSS</label>

            <input type="checkbox" id="js" name="skills" value="javascript">
            <label for="js">JavaScript</label>

            <input type="checkbox" id="python" name="skills" value="python">
            <label for="python">Python</label>

            <br><br>

            <label for="resume">Resume Upload:</label><br>
            <input 
                type="file" 
                id="resume" 
                name="resume" 
                required 
                accept=".pdf,.doc,.docx">
        </fieldset>

        <br>

        <!-- 4.5 Consent -->
        <fieldset>
            <legend>Consent & Compliance</legend>

            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the Terms & Conditions</label>
        </fieldset>

        <br>

        <button type="submit">Submit</button>

    </form>

</body>
</html>
