<!doctype html>
<html>
  <body>
    <button onclick="getDogFact()">Get Dog Fact</button>
    <p id="fact"></p>

    <script>
      async function getDogFact() {
        const response = await fetch("https://dogapi.dog/api/v1/facts");

        const data = await response.json();

        console.log(data);

        document.getElementById("fact").innerText = JSON.stringify(data);
      }
    </script>
  </body>
</html>
