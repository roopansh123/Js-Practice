<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Sign up form</h2>
    <form>
      <label for="firstname">First Name</label>
      <input class="firstname" placeholder="Enter First Name" />
      <br />
      <br />

      <label for="firstname">Last Name</label>
      <input class="firstname" />

      <br />
      <br />
      <label for="username">Username </label>
      <input
        class="username"
        placeholder="Enter your username"
        minlength="3"
        maxlength="20"
      />
      <br />
      <br />

      <label for="email">Email Id: </label>
      <input class="email" placeholder="Enter Your Email" type="email" />
      <br />
      <br />

      <label for="phone">Phone Number</label>
      <input
        class="phone"
        placeholder="enter your phone number"
        type="number"
        minlength="9"
      />
      <br />
      <br />

      <label for="pass">Password</label>
      <input
        class="pass"
        placeholder="enter password"
        type="password"
        minlength="8"
        maxlength="20"
      />
      <br />
      <br />

      <label for="dob">DOB</label>
      <input class="dob" type="date" />
      <br />
      <br />

      <label for="gender">Gender :</label>

      <input class="male" name="gender" type="radio" />
      <label for="male">Male</label>
      <input class="female" name="gender" type="radio" />
      <label for="female">Female</label>

      <br />

      <button>Submit</button>
    </form>
  </body>
</html>
